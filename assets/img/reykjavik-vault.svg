<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%" style="background:#000;">
  <!-- Grid Watermark -->
  <defs>
    <pattern id="grid-r" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222" stroke-width="1.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid-r)"/>
  
  <!-- Surface Bedrock Line -->
  <line x1="0" y1="260" x2="1200" y2="260" stroke="#FFF" stroke-width="8"/>
  <text x="40" y="240" fill="#FFF" font-family="monospace" font-size="18" font-weight="bold">SURFACE LEVEL [BASALT STRATIGRAPHY // LEVEL ±0.00M]</text>
  
  <!-- Subterranean Containment Vault -->
  <polygon points="260,260 940,260 860,680 340,680" fill="#111" stroke="#FFF" stroke-width="6"/>
  <polygon points="300,290 900,290 830,640 370,640" fill="#000" stroke="#FFF" stroke-width="4" stroke-dasharray="8,8"/>
  
  <!-- Geothermal Thermal Core Elements -->
  <circle cx="600" cy="460" r="110" fill="none" stroke="#FFF" stroke-width="5"/>
  <circle cx="600" cy="460" r="70" fill="none" stroke="#FFF" stroke-width="3" stroke-dasharray="10,5"/>
  <circle cx="600" cy="460" r="30" fill="#FFF"/>
  <line x1="600" y1="290" x2="600" y2="640" stroke="#FFF" stroke-width="4"/>
  <line x1="340" y1="460" x2="860" y2="460" stroke="#FFF" stroke-width="4"/>
  
  <!-- Sub-Surface Anchors -->
  <line x1="340" y1="680" x2="300" y2="760" stroke="#FFF" stroke-width="6"/>
  <line x1="860" y1="680" x2="900" y2="760" stroke="#FFF" stroke-width="6"/>
  <polygon points="285,760 315,760 300,780" fill="#FFF"/>
  <polygon points="885,760 915,760 900,780" fill="#FFF"/>

  <!-- Technical Stamp -->
  <rect x="60" y="620" width="260" height="100" fill="#000" stroke="#FFF" stroke-width="3"/>
  <text x="80" y="650" fill="#FFF" font-family="monospace" font-size="16" font-weight="bold">[ BLUEPRINT // #ST-102 ]</text>
  <text x="80" y="675" fill="#AAA" font-family="monospace" font-size="14">REYKJAVIK THERMAL VAULT</text>
  <text x="80" y="698" fill="#FFF" font-family="monospace" font-size="14">DEPTH: -45.0 METERS BEDROCK</text>

  <!-- Depth Indicators -->
  <line x1="980" y1="260" x2="980" y2="680" stroke="#FFF" stroke-width="2"/>
  <polygon points="975,270 985,270 980,260" fill="#FFF"/>
  <polygon points="975,670 985,670 980,680" fill="#FFF"/>
  <text x="1000" y="480" fill="#FFF" font-family="monospace" font-size="18" font-weight="bold" transform="rotate(90,1000,480)">-45.0M SUBTERRANEAN CORE</text>
</svg>
