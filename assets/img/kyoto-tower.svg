<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%" style="background:#000;">
  <!-- Grid Watermark -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222" stroke-width="1.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Architectural Silhouette & Core -->
  <rect x="350" y="80" width="360" height="640" fill="#111" stroke="#FFF" stroke-width="6"/>
  <rect x="390" y="40" width="280" height="40" fill="#000" stroke="#FFF" stroke-width="6"/>
  <line x1="530" y1="0" x2="530" y2="40" stroke="#FFF" stroke-width="8"/>
  
  <!-- Internal Floor Plates -->
  <line x1="350" y1="160" x2="710" y2="160" stroke="#FFF" stroke-width="3"/>
  <line x1="350" y1="240" x2="710" y2="240" stroke="#FFF" stroke-width="3"/>
  <line x1="350" y1="320" x2="710" y2="320" stroke="#FFF" stroke-width="3"/>
  <line x1="350" y1="400" x2="710" y2="400" stroke="#FFF" stroke-width="3"/>
  <line x1="350" y1="480" x2="710" y2="480" stroke="#FFF" stroke-width="3"/>
  <line x1="350" y1="560" x2="710" y2="560" stroke="#FFF" stroke-width="3"/>
  <line x1="350" y1="640" x2="710" y2="640" stroke="#FFF" stroke-width="3"/>
  
  <!-- Corten Steel X-Brace Exoskeleton -->
  <line x1="350" y1="80" x2="710" y2="400" stroke="#FFF" stroke-width="5" stroke-dasharray="12,6"/>
  <line x1="710" y1="80" x2="350" y2="400" stroke="#FFF" stroke-width="5" stroke-dasharray="12,6"/>
  <line x1="350" y1="400" x2="710" y2="720" stroke="#FFF" stroke-width="5" stroke-dasharray="12,6"/>
  <line x1="710" y1="400" x2="350" y2="720" stroke="#FFF" stroke-width="5" stroke-dasharray="12,6"/>
  
  <!-- Structural Nodes -->
  <circle cx="350" cy="80" r="10" fill="#FFF"/>
  <circle cx="710" cy="80" r="10" fill="#FFF"/>
  <circle cx="530" cy="240" r="14" fill="#000" stroke="#FFF" stroke-width="4"/>
  <circle cx="350" cy="400" r="10" fill="#FFF"/>
  <circle cx="710" cy="400" r="10" fill="#FFF"/>
  <circle cx="530" cy="560" r="14" fill="#000" stroke="#FFF" stroke-width="4"/>
  <circle cx="350" cy="720" r="10" fill="#FFF"/>
  <circle cx="710" cy="720" r="10" fill="#FFF"/>

  <!-- Technical Stamp -->
  <rect x="60" y="620" width="240" height="100" fill="#000" stroke="#FFF" stroke-width="3"/>
  <text x="80" y="650" fill="#FFF" font-family="monospace" font-size="16" font-weight="bold">[ BLUEPRINT // #ST-101 ]</text>
  <text x="80" y="675" fill="#AAA" font-family="monospace" font-size="14">KYOTO MONOLITH TOWER</text>
  <text x="80" y="698" fill="#FFF" font-family="monospace" font-size="14">ELEVATION: +164 METERS</text>

  <!-- Dimension Arrows -->
  <line x1="760" y1="80" x2="760" y2="720" stroke="#FFF" stroke-width="2"/>
  <polygon points="755,90 765,90 760,80" fill="#FFF"/>
  <polygon points="755,710 765,710 760,720" fill="#FFF"/>
  <text x="780" y="410" fill="#FFF" font-family="monospace" font-size="18" font-weight="bold" transform="rotate(90,780,410)">164.0M STRUCTURAL SPAN</text>
</svg>
