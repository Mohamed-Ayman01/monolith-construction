<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%" style="background:#000;">
  <!-- Grid Watermark -->
  <defs>
    <pattern id="grid-v" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222" stroke-width="1.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid-v)"/>
  
  <!-- Oceanographic Research Monolith -->
  <rect x="520" y="140" width="340" height="540" fill="#111" stroke="#FFF" stroke-width="6"/>
  <rect x="560" y="180" width="260" height="40" fill="#000" stroke="#FFF" stroke-width="3"/>
  <rect x="560" y="260" width="260" height="40" fill="#000" stroke="#FFF" stroke-width="3"/>
  <rect x="560" y="340" width="260" height="40" fill="#000" stroke="#FFF" stroke-width="3"/>
  
  <!-- Interlocking Tetrapod Wave Shield -->
  <!-- Tetrapod 1 -->
  <polygon points="180,540 240,460 300,540 240,620" fill="#000" stroke="#FFF" stroke-width="5"/>
  <line x1="180" y1="540" x2="300" y2="540" stroke="#FFF" stroke-width="3"/>
  <line x1="240" y1="460" x2="240" y2="620" stroke="#FFF" stroke-width="3"/>
  
  <!-- Tetrapod 2 -->
  <polygon points="300,580 360,500 420,580 360,660" fill="#111" stroke="#FFF" stroke-width="5"/>
  <line x1="300" y1="580" x2="420" y2="580" stroke="#FFF" stroke-width="3"/>
  <line x1="360" y1="500" x2="360" y2="660" stroke="#FFF" stroke-width="3"/>
  
  <!-- Tetrapod 3 -->
  <polygon points="420,540 480,460 540,540 480,620" fill="#000" stroke="#FFF" stroke-width="5"/>
  <line x1="420" y1="540" x2="540" y2="540" stroke="#FFF" stroke-width="3"/>
  <line x1="480" y1="460" x2="480" y2="620" stroke="#FFF" stroke-width="3"/>
  
  <!-- Mediterranean Wave Surge Lines -->
  <path d="M 0,660 Q 150,620 300,660 T 600,660" fill="none" stroke="#FFF" stroke-width="6"/>
  <path d="M 0,720 Q 200,680 400,720 T 800,720" fill="none" stroke="#FFF" stroke-width="4" stroke-dasharray="12,6"/>

  <!-- Technical Stamp -->
  <rect x="60" y="100" width="280" height="100" fill="#000" stroke="#FFF" stroke-width="3"/>
  <text x="80" y="130" fill="#FFF" font-family="monospace" font-size="16" font-weight="bold">[ BLUEPRINT // #ST-104 ]</text>
  <text x="80" y="155" fill="#AAA" font-family="monospace" font-size="14">VALLETTA COASTAL MONOLITH</text>
  <text x="80" y="178" fill="#FFF" font-family="monospace" font-size="14">SURGE SHIELD: 18.5 METERS</text>
</svg>
